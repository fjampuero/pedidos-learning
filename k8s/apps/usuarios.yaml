apiVersion: v1
kind: Secret
metadata:
  name: usuarios-app-secret
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: usuarios_pedidos
  SPRING_DATASOURCE_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usuarios
spec:
  replicas: 2
  selector:
    matchLabels:
      app: usuarios
  template:
    metadata:
      labels:
        app: usuarios
    spec:
      containers:
        - name: usuarios
          image: usuarios:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-usuarios:5432/usuarios_pedidos_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: usuarios-app-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: usuarios-app-secret
                  key: SPRING_DATASOURCE_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: usuarios
spec:
  selector:
    app: usuarios
  ports:
    - name: http
      port: 8082
      targetPort: 8082
