apiVersion: v1
kind: Secret
metadata:
  name: payments-app-secret
type: Opaque
stringData:
  DB_USERNAME: payments_pedidos
  DB_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: payments:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: DB_URL
              value: jdbc:postgresql://postgres-payments:5432/payments_pedidos_db
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payments-app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payments-app-secret
                  key: DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: messaging-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: LOG_LEVEL
              value: INFO
            - name: DDL_AUTO
              value: update
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payments
spec:
  selector:
    app: payments
  ports:
    - name: http
      port: 8085
      targetPort: 8085
