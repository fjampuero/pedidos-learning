apiVersion: v1
kind: Secret
metadata:
  name: catalogo-app-secret
type: Opaque
stringData:
  DB_USERNAME: catalogo_pedidos
  DB_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogo
  template:
    metadata:
      labels:
        app: catalogo
    spec:
      containers:
        - name: catalogo
          image: catalogo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: DB_URL
              value: jdbc:postgresql://postgres-catalogo:5432/catalogo_pedidos_db
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalogo-app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogo-app-secret
                  key: DB_PASSWORD
            - name: LOG_LEVEL
              value: INFO
            - name: DDL_AUTO
              value: update
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: catalogo
spec:
  selector:
    app: catalogo
  ports:
    - name: http
      port: 8083
      targetPort: 8083
