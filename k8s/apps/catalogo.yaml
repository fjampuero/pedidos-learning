apiVersion: v1
kind: Secret
metadata:
  name: catalogo-app-secret
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: catalogo_pedidos
  SPRING_DATASOURCE_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalogo
  template:
    metadata:
      labels:
        app: catalogo
    spec:
      containers:
        - name: catalogo
          image: catalogo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-catalogo:5432/catalogo_pedidos_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: catalogo-app-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogo-app-secret
                  key: SPRING_DATASOURCE_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: catalogo
spec:
  selector:
    app: catalogo
  ports:
    - name: http
      port: 8083
      targetPort: 8083
