apiVersion: v1
kind: Secret
metadata:
  name: orders-app-secret
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: orders_pedidos
  SPRING_DATASOURCE_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: orders:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-orders:5432/orders_pedidos_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orders-app-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-app-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: messaging-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: INTEGRATIONS_USUARIOS_BASE_URL
              value: http://usuarios:8082
            - name: INTEGRATIONS_CATALOGO_BASE_URL
              value: http://catalogo:8083
---
apiVersion: v1
kind: Service
metadata:
  name: orders
spec:
  selector:
    app: orders
  ports:
    - name: http
      port: 8084
      targetPort: 8084
