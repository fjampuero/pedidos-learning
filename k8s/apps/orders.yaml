apiVersion: v1
kind: Secret
metadata:
  name: orders-app-secret
type: Opaque
stringData:
  DB_USERNAME: orders_pedidos
  DB_PASSWORD: user123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: orders:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: DB_URL
              value: jdbc:postgresql://postgres-orders:5432/orders_pedidos_db
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: orders-app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-app-secret
                  key: DB_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: messaging-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: USUARIOS_BASE_URL
              value: http://usuarios:8082
            - name: CATALOGO_BASE_URL
              value: http://catalogo:8083
            - name: LOG_LEVEL
              value: INFO
            - name: DDL_AUTO
              value: update
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: orders
spec:
  selector:
    app: orders
  ports:
    - name: http
      port: 8084
      targetPort: 8084
