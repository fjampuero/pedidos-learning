apiVersion: v1
kind: Secret
metadata:
  name: catalogo-postgres-secret
type: Opaque
stringData:
  POSTGRES_USER: catalogo_pedidos
  POSTGRES_PASSWORD: user123
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catalogo-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-catalogo
spec:
  serviceName: postgres-catalogo
  replicas: 1
  selector:
    matchLabels:
      app: postgres-catalogo
  template:
    metadata:
      labels:
        app: postgres-catalogo
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: catalogo_pedidos_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: catalogo-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogo-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: catalogo-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-catalogo
spec:
  selector:
    app: postgres-catalogo
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
