server:
  port: 8083

spring:
  application:
    name: catalogo-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-catalogo:5432/catalogo_pedidos_db}
    username: ${DB_USERNAME:catalogo_pedidos}
    password: ${DB_PASSWORD:user123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${POOL_SIZE:10}
      minimum-idle: ${POOL_MIN_IDLE:5}
      connection-timeout: ${POOL_CONNECTION_TIMEOUT:20000}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    com.codigo.pedido.catalogo: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
