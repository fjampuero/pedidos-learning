server:
  port: 8086

spring:
  application:
    name: entregas-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://host.docker.internal:5424/entregas_pedidos_db}
    username: ${DB_USERNAME:entregas_pedidos}
    password: ${DB_PASSWORD:user123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${POOL_SIZE:10}
      minimum-idle: ${POOL_MIN_IDLE:5}
      connection-timeout: ${POOL_CONNECTION_TIMEOUT:20000}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:host.docker.internal:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:entregas-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.codigo.pedido.entregas.infrastructure.messaging.event"
        spring.json.value.default.type: com.codigo.pedido.entregas.infrastructure.messaging.event.PagoAprobadoEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

events:
  topics:
    pago-aprobado: ${TOPIC_PAGO_APROBADO:pago-aprobado}
    entrega-creada: ${TOPIC_ENTREGA_CREADA:entrega-creada}
    entrega-actualizada: ${TOPIC_ENTREGA_ACTUALIZADA:entrega-actualizada}

resilience:
  kafka:
    max-retries: ${KAFKA_MAX_RETRIES:3}
    retry-interval-ms: ${KAFKA_RETRY_INTERVAL_MS:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    com.codigo.pedido.entregas: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:clave_super_secreta_clave_super_secreta_12345}
