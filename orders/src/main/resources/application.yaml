spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:postgresql://localhost:5422/orders_pedidos_db
    username: orders_pedidos
    password: user123
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: orders-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.codigo.pedido.orders.infrastructure.messaging.event"
        spring.json.value.default.type: com.codigo.pedido.orders.infrastructure.messaging.event.PagoAprobadoEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8084

integrations:
  usuarios:
    base-url: http://localhost:8082
  catalogo:
    base-url: http://localhost:8083

events:
  topics:
    pedido-creado: pedido-creado
    pago-aprobado: pago-aprobado

resilience:
  circuit-breaker:
    failure-threshold: 3
    open-duration-ms: 10000
